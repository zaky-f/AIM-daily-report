<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AIM Daily Report</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 24px 16px;
      color: #1a202c;
    }
    .card {
      max-width: 800px; margin: 0 auto; background: #fff;
      border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.10); overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, #1a3c5e 0%, #2563eb 100%);
      color: #fff; padding: 28px 32px 20px;
    }
    .card-header h1 { font-size: 1.5rem; font-weight: 700; }
    .card-header p  { margin-top: 4px; font-size: .92rem; opacity: .85; }
    .card-body { padding: 28px 32px; }
    .section-title {
      font-size: .78rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: #2563eb;
      margin: 28px 0 12px; padding-bottom: 6px;
      border-bottom: 2px solid #dbeafe;
    }
    .section-title:first-child { margin-top: 0; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid .full { grid-column: 1 / -1; }
    .crew-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    label { display: block; font-size: .84rem; font-weight: 600; color: #374151; margin-bottom: 5px; }
    label .req { color: #ef4444; margin-left: 2px; }
    input, select, textarea {
      width: 100%; padding: 9px 12px; border: 1.5px solid #d1d5db;
      border-radius: 7px; font-size: .92rem; background: #fff; color: #1a202c;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    select:disabled { background: #f3f4f6; color: #9ca3af; cursor: not-allowed; }
    textarea { resize: vertical; min-height: 68px; }
    .hint { font-size: .75rem; color: #6b7280; margin-top: 4px; }
    .btn-submit {
      display: block; width: 100%; margin-top: 28px; padding: 13px;
      background: linear-gradient(135deg, #1a3c5e, #2563eb);
      color: #fff; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: opacity .2s;
    }
    .btn-submit:hover { opacity: .9; }
    .btn-submit:disabled { opacity: .55; cursor: not-allowed; }
    #statusMsg {
      margin-top: 16px; padding: 12px 16px; border-radius: 8px;
      font-size: .9rem; font-weight: 600; display: none;
    }
    #statusMsg.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    #statusMsg.error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    @media (max-width: 580px) {
      .form-grid, .crew-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
      .card-body { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>📋 AIM Daily Report</h1>
    <p>Fill in all required fields (*) then submit.</p>
  </div>
  <div class="card-body">

    <!-- GENERAL INFO -->
    <div class="section-title">General Information</div>
    <div class="form-grid">
      <div>
        <label>Date <span class="req">*</span></label>
        <input type="date" id="date" required />
      </div>
      <div>
        <label>Shift <span class="req">*</span></label>
        <select id="shift" required>
          <option value="">— Select Shift —</option>
          <option>Day Shift</option>
          <option>Night Shift</option>
        </select>
      </div>
      <div>
        <label>Supervisor / Foreman <span class="req">*</span></label>
        <input type="text" id="supervisor" placeholder="Full name" required />
      </div>
      <div>
        <label>Contact</label>
        <input type="text" id="contact" placeholder="Phone / WhatsApp" />
      </div>
      <div>
        <label>Working Area <span class="req">*</span></label>
        <select id="workingArea" required>
          <option value="">— Select Working Area —</option>
          <option>Pyrite Plant</option>
          <option>Acid Plant</option>
          <option>Chloride Plant</option>
          <option>Copper Cathode Plant</option>
          <option>Makarti Camp</option>
          <option>Storage Facility</option>
          <option>Waste Dump Facility</option>
          <option>Labota</option>
        </select>
      </div>
      <div>
        <label>Status <span class="req">*</span></label>
        <select id="status" required>
          <option value="">— Select Status —</option>
          <option>In Progress</option>
          <option>Completed</option>
          <option>On Hold</option>
          <option>Cancelled</option>
        </select>
      </div>
      <div>
        <label>Jam Mulai Pekerjaan <span class="req">*</span></label>
        <input type="time" id="jamMulai" required />
      </div>
      <div>
        <label>Jam Selesai Pekerjaan</label>
        <input type="time" id="jamSelesai" />
      </div>
    </div>

    <!-- WORK CLASSIFICATION -->
    <div class="section-title">Work Classification</div>
    <div class="form-grid">
      <div>
        <label>Discipline <span class="req">*</span></label>
        <select id="discipline" required>
          <option value="">— Loading... —</option>
        </select>
      </div>
      <div>
        <label>Work Category <span class="req">*</span></label>
        <select id="workCategory" disabled required>
          <option value="">— Select Discipline first —</option>
        </select>
        <p class="hint">Updates automatically based on Discipline.</p>
      </div>
      <div>
        <label>WBS</label>
        <input type="text" id="wbs" placeholder="e.g. 4306" />
      </div>
      <div>
        <label>WR / WO / PI / CWO / DERF Number</label>
        <input type="text" id="wrNumber" placeholder="e.g. WO-2024-001" />
      </div>
      <div>
        <label>Equipment Tag Number</label>
        <input type="text" id="equipmentTag" placeholder="e.g. P-101A" />
      </div>
      <div>
        <label>Activity <span class="req">*</span></label>
        <input type="text" id="activity" placeholder="Brief activity description" required />
      </div>
      <div class="full">
        <label>Photos (link or file reference)</label>
        <input type="text" id="photos" placeholder="e.g. Google Drive link" />
      </div>
    </div>

    <!-- MANPOWER -->
    <div class="section-title">Manpower</div>
    <div class="form-grid">
      <div>
        <label>Total Manpower <span class="req">*</span></label>
        <input type="number" id="manpower" min="0" step="1" placeholder="Total headcount" required />
      </div>
      <div>
        <label>List Penggunaan Material</label>
        <input type="text" id="materialList" placeholder="e.g. Cable 3x50mm² – 100m" />
      </div>
    </div>

    <!-- CREW BREAKDOWN -->
    <div class="section-title">Crew Breakdown</div>
    <div class="crew-grid">
      <div><label>MMS Crew</label><input type="number" id="crewMMS" min="0" value="0" /></div>
      <div><label>AGI Crew</label><input type="number" id="crewAGI" min="0" value="0" /></div>
      <div><label>RGD Crew</label><input type="number" id="crewRGD" min="0" value="0" /></div>
      <div><label>HAM Crew</label><input type="number" id="crewHAM" min="0" value="0" /></div>
      <div><label>BMS Crew</label><input type="number" id="crewBMS" min="0" value="0" /></div>
      <div><label>Superkrane</label><input type="number" id="crewSuperkrane" min="0" value="0" /></div>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">
      Submit Daily Report
    </button>
    <div id="statusMsg"></div>

  </div>
</div>

<script>
  // ── PASTE YOUR APPS SCRIPT /exec URL BELOW ──
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_dBsyFE4M-ym5T4FBqImSIB7aUSCC1SC8q42COEuiJeRabBUaKJKMowudYIW9QkGv/exec';
  // ────────────────────────────────────────────

  // Set today's date
  document.getElementById('date').valueAsDate = new Date();

  // Load disciplines on page load
  fetch(SCRIPT_URL + '?action=getDisciplines')
    .then(r => r.json())
    .then(disciplines => {
      const sel = document.getElementById('discipline');
      sel.innerHTML = '<option value="">— Select Discipline —</option>';
      disciplines.forEach(d => {
        const o = document.createElement('option');
        o.value = o.textContent = d;
        sel.appendChild(o);
      });
    })
    .catch(() => {
      document.getElementById('discipline').innerHTML =
        '<option value="">⚠️ Failed to load — check SCRIPT_URL</option>';
    });

  // Cascade: discipline → work category
  document.getElementById('discipline').addEventListener('change', function () {
    const catSel = document.getElementById('workCategory');
    catSel.innerHTML = '<option value="">— Loading... —</option>';
    catSel.disabled = true;
    if (!this.value) {
      catSel.innerHTML = '<option value="">— Select Discipline first —</option>';
      return;
    }
    fetch(SCRIPT_URL + '?action=getCategories&discipline=' + encodeURIComponent(this.value))
      .then(r => r.json())
      .then(cats => {
        catSel.innerHTML = '<option value="">— Select Work Category —</option>';
        cats.forEach(c => {
          const o = document.createElement('option');
          o.value = o.textContent = c;
          catSel.appendChild(o);
        });
        catSel.disabled = false;
      });
  });

  // Submit
  function handleSubmit() {
    const btn = document.getElementById('submitBtn');
    const requiredFields = ['date','shift','supervisor','workingArea','status',
                            'jamMulai','discipline','workCategory','activity','manpower'];
    for (const id of requiredFields) {
      if (!document.getElementById(id).value.trim()) {
        showStatus('Please fill in all required (*) fields.', false);
        document.getElementById(id).focus();
        return;
      }
    }
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    const f = {
      date:           document.getElementById('date').value,
      discipline:     document.getElementById('discipline').value,
      workCategory:   document.getElementById('workCategory').value,
      workingArea:    document.getElementById('workingArea').value,
      wrNumber:       document.getElementById('wrNumber').value,
      wbs:            document.getElementById('wbs').value,
      equipmentTag:   document.getElementById('equipmentTag').value,
      activity:       document.getElementById('activity').value,
      shift:          document.getElementById('shift').value,
      jamMulai:       document.getElementById('jamMulai').value,
      status:         document.getElementById('status').value,
      photos:         document.getElementById('photos').value,
      supervisor:     document.getElementById('supervisor').value,
      jamSelesai:     document.getElementById('jamSelesai').value,
      manpower:       document.getElementById('manpower').value,
      contact:        document.getElementById('contact').value,
      crewMMS:        document.getElementById('crewMMS').value,
      materialList:   document.getElementById('materialList').value,
      crewAGI:        document.getElementById('crewAGI').value,
      crewRGD:        document.getElementById('crewRGD').value,
      crewHAM:        document.getElementById('crewHAM').value,
      crewBMS:        document.getElementById('crewBMS').value,
      crewSuperkrane: document.getElementById('crewSuperkrane').value,
    };

    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(f) })
      .then(r => r.json())
      .then(result => {
        btn.disabled = false;
        btn.textContent = 'Submit Daily Report';
        if (result.success) {
          showStatus('✅ Report submitted successfully!', true);
          resetForm();
        } else {
          showStatus('❌ ' + result.message, false);
        }
      })
      .catch(err => {
        btn.disabled = false;
        btn.textContent = 'Submit Daily Report';
        showStatus('❌ Network error — check SCRIPT_URL is correct.', false);
      });
  }

  function resetForm() {
    ['supervisor','contact','wrNumber','wbs','equipmentTag',
     'activity','photos','manpower','materialList']
      .forEach(id => document.getElementById(id).value = '');
    ['crewMMS','crewAGI','crewRGD','crewHAM','crewBMS','crewSuperkrane']
      .forEach(id => document.getElementById(id).value = '0');
    document.getElementById('date').valueAsDate = new Date();
    ['discipline','shift','status','workingArea'].forEach(id => document.getElementById(id).value = '');
    ['jamMulai','jamSelesai'].forEach(id => document.getElementById(id).value = '');
    const c = document.getElementById('workCategory');
    c.innerHTML = '<option value="">— Select Discipline first —</option>';
    c.disabled = true;
  }

  function showStatus(msg, success) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = success ? 'success' : 'error';
    el.style.display = 'block';
    if (success) setTimeout(() => el.style.display = 'none', 5000);
  }
</script>
</body>
</html>
